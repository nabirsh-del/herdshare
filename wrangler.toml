name = "herdshare"
type = "javascript"
main = "public/index.html"
compatibility_date = "2024-01-11"

[build]
command = "npm install"
cwd = "."

[env.production]
vars = { ENVIRONMENT = "production" }

[[routes]]
pattern = "herdshare.com/*"
zone_id = ""

[env.production.vars]
STRIPE_PUBLISHABLE_KEY = ""
STRIPE_SECRET_KEY = ""
GOOGLE_SHEETS_ID = ""
SENDGRID_API_KEY = ""
